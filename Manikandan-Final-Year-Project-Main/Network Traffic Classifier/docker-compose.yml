version: '3'

services:
  packet-capturer:
    build:
      context: ./capture
    network_mode: host          # must be top-level under service, not at bottom
    volumes:
      - ./data1:/app/data1
    environment:
      - CAPTURE_IFACE=eth0

  feature-engineering:
    build:
      context: ./Featureengine
    volumes:
      - ./data1:/app/data1
      - ./data2:/app/data2
    depends_on:
      - packet-capturer

  ml-model:
    build:
      context: ./MLModel
    volumes:
      - ./data2:/app/data2
      - ./data3:/app/data3
    depends_on:
      - feature-engineering